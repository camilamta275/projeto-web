version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fiscalize_db
    environment:
      POSTGRES_USER: fiscalize
      POSTGRES_PASSWORD: fiscalize123
      POSTGRES_DB: fiscalize
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fiscalize_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fiscalize_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fiscalize.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fiscalize_network

  redis:
    image: redis:7-alpine
    container_name: fiscalize_redis
    ports:
      - "6379:6379"
    networks:
      - fiscalize_network

volumes:
  postgres_data:

networks:
  fiscalize_network:
    driver: bridge
